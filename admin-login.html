<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSIS Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .login-card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 1rem 0; border-radius: 0.5rem; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>OSIS Admin</h2>
        <p>Enter access password</p>
        <input type="password" id="passwordField" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
    </div>

    <script>
        function handleLogin() {
            const pass = document.getElementById('passwordField').value;
            // CHANGE 'osis2026' to your desired password
            if (pass === 'ocis-icis') {
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Incorrect Password!');
            }
        }
    </script>
</body>
</html>
